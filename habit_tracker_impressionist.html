
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

.canvas {
  background: #f2ede4;
  border-radius: 16px;
  padding: 2rem 1.75rem 2rem;
  position: relative;
  overflow: hidden;
}

.canvas::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(ellipse 60px 40px at 15% 20%, rgba(180,160,120,0.13) 0%, transparent 100%),
    radial-gradient(ellipse 80px 50px at 85% 15%, rgba(160,140,100,0.10) 0%, transparent 100%),
    radial-gradient(ellipse 100px 60px at 50% 90%, rgba(140,120,80,0.08) 0%, transparent 100%);
  pointer-events: none;
  border-radius: 16px;
}

.texture {
  position: absolute;
  inset: 0;
  border-radius: 16px;
  pointer-events: none;
  opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)'/%3E%3C/svg%3E");
}

.header { position: relative; margin-bottom: 1.5rem; }

.eyebrow {
  font-family: 'Lato', sans-serif;
  font-weight: 300;
  font-size: 10px;
  letter-spacing: 0.18em;
  color: #8a7e6a;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.main-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 28px;
  font-weight: 400;
  font-style: italic;
  color: #2d2619;
  letter-spacing: -0.2px;
  line-height: 1.1;
}

.date-line {
  font-family: 'Lato', sans-serif;
  font-weight: 300;
  font-size: 12px;
  color: #9a8e78;
  margin-top: 5px;
}

.reset-btn {
  position: absolute;
  top: 0; right: 0;
  font-family: 'Lato', sans-serif;
  font-size: 11px;
  font-weight: 300;
  color: #b0a48e;
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 2px;
}

.garden {
  display: flex;
  justify-content: center;
  margin: 0.5rem 0 1.75rem;
  position: relative;
}

.flower-msg {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 12px;
  color: #8a7e6a;
  text-align: center;
  margin-top: 6px;
  min-height: 18px;
}

.habits { display: flex; flex-direction: column; gap: 8px; }

.hcard {
  background: rgba(255,252,246,0.7);
  border: 0.5px solid #ddd5c4;
  border-radius: 14px;
  padding: 13px 16px;
  display: flex;
  align-items: center;
  gap: 13px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
  overflow: hidden;
}

.hcard::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
  pointer-events: none;
}

.hcard:hover { border-color: #c8b89a; background: rgba(255,252,248,0.9); }

.hcard.done {
  background: rgba(234,245,228,0.75);
  border-color: #b8d4aa;
}

.hcircle {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 1px solid #d5c9b4;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 15px;
  background: rgba(255,255,255,0.6);
  transition: all 0.2s;
}

.hcard.done .hcircle {
  background: #5a8a50;
  border-color: #5a8a50;
}

.hcard.done .hcircle .hicon { display: none; }
.hchk { display: none; color: #fff; font-size: 13px; }
.hcard.done .hchk { display: block; }

.hinfo { flex: 1; }

.hname {
  font-family: 'Lato', sans-serif;
  font-weight: 400;
  font-size: 13px;
  color: #2d2619;
  margin-bottom: 6px;
}
.hcard.done .hname { color: #3a6830; }

.hdots { display: flex; gap: 4px; }
.hdot { width: 6px; height: 6px; border-radius: 50%; background: #ddd5c4; }
.hdot.on { background: #7aab68; }
.hdot.cur { border: 1px solid #b0a48e; }

.hstreak { text-align: right; flex-shrink: 0; }
.hstreak-num {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  color: #2d2619;
  line-height: 1;
}
.hstreak-num.hot { color: #b85820; }
.hstreak-lbl {
  font-family: 'Lato', sans-serif;
  font-size: 10px;
  font-weight: 300;
  color: #9a8e78;
  margin-top: 2px;
}

.stats {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 8px;
  margin-top: 1.25rem;
}

.scard {
  background: rgba(255,252,246,0.7);
  border: 0.5px solid #ddd5c4;
  border-radius: 10px;
  padding: 10px 8px;
  text-align: center;
}

.snum {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  color: #2d2619;
  line-height: 1;
}

.slbl {
  font-family: 'Lato', sans-serif;
  font-weight: 300;
  font-size: 10px;
  color: #9a8e78;
  margin-top: 3px;
  line-height: 1.3;
}

.brush-stroke {
  position: absolute;
  pointer-events: none;
  opacity: 0.07;
}
</style>

<h2 class="sr-only">Impresjonistyczny tracker nawyków z rosnącym kwiatkiem</h2>

<div class="canvas">
  <div class="texture"></div>

  <svg class="brush-stroke" style="top:-10px;right:-20px;width:180px;height:80px;" viewBox="0 0 180 80">
    <path d="M10,60 Q60,10 120,40 Q160,60 175,30" stroke="#7a9e6a" stroke-width="18" fill="none" stroke-linecap="round" opacity="1"/>
  </svg>
  <svg class="brush-stroke" style="bottom:20px;left:-15px;width:120px;height:60px;" viewBox="0 0 120 60">
    <path d="M5,50 Q40,5 80,30 Q110,45 115,20" stroke="#c8a06a" stroke-width="14" fill="none" stroke-linecap="round" opacity="1"/>
  </svg>

  <div class="header">
    <div class="eyebrow">tracker nawyków</div>
    <div class="main-title">Moje nawyki</div>
    <div class="date-line" id="date-lbl"></div>
    <button class="reset-btn" onclick="resetDay()">resetuj dzień</button>
  </div>

  <div class="garden">
    <div style="display:flex;flex-direction:column;align-items:center;">
      <svg id="flower-svg" width="180" height="170" viewBox="0 0 180 170" xmlns="http://www.w3.org/2000/svg" aria-label="Kwiatek rosnący z postępem nawyków"></svg>
      <div class="flower-msg" id="flower-msg"></div>
    </div>
  </div>

  <div class="habits" id="habits"></div>

  <div class="stats">
    <div class="scard"><div class="snum" id="s-done">0</div><div class="slbl">dziś<br>zrobione</div></div>
    <div class="scard"><div class="snum">6</div><div class="slbl">wszystkich<br>nawyków</div></div>
    <div class="scard"><div class="snum" id="s-best">0</div><div class="slbl">najlepszy<br>streak</div></div>
    <div class="scard"><div class="snum" id="s-pct">0%</div><div class="slbl">ukończono<br>dziś</div></div>
  </div>
</div>

<script>
const HABITS = [
  { id: 'czytanie', name: 'Czytanie książki', icon: '📖' },
  { id: 'cwiczenia', name: 'Ćwiczenia (20–30 min)', icon: '🏃' },
  { id: 'medytacja', name: 'Medytacja', icon: '🧘' },
  { id: 'planowanie', name: 'Planowanie dnia', icon: '📋' },
  { id: 'sen', name: 'Regularny sen', icon: '🌙' },
  { id: 'social', name: 'Ograniczenie social media', icon: '📵' },
];
const TOTAL = HABITS.length;
const todayKey = () => new Date().toISOString().slice(0,10);

function load() { try { const r=localStorage.getItem('hi_v1'); return r?JSON.parse(r):{days:{}}; } catch { return {days:{}}; } }
function save(s) { try { localStorage.setItem('hi_v1', JSON.stringify(s)); } catch {} }

let state = load();
const today = todayKey();
if (!state.days[today]) state.days[today] = {};

function streak(id) { let n=0; const d=new Date(); while(true){const k=d.toISOString().slice(0,10); if(state.days[k]?.[id]){n++;d.setDate(d.getDate()-1);}else break;} return n; }
function bestStreak(id) { const keys=Object.keys(state.days).sort(); let best=0,cur=0,prev=null; for(const k of keys){if(state.days[k]?.[id]){cur=prev&&(new Date(k)-new Date(prev))/86400000===1?cur+1:1;if(cur>best)best=cur;prev=k;}else{cur=0;prev=null;}} return best; }
function last7(id) { return Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));const k=d.toISOString().slice(0,10);return{done:!!state.days[k]?.[id],isToday:i===6};}); }
function toggle(id) { state.days[today][id]=!state.days[today][id]; save(state); render(); }
function resetDay() { state.days[today]={}; save(state); render(); }

function blob(cx, cy, r, n, seed) {
  const pts = [];
  for (let i=0;i<n;i++) {
    const angle = (i/n)*Math.PI*2;
    const rr = r + Math.sin(seed+i*2.3)*r*0.18 + Math.cos(seed*1.7+i*1.1)*r*0.12;
    pts.push([cx+Math.cos(angle)*rr, cy+Math.sin(angle)*rr]);
  }
  let d = `M ${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)}`;
  for (let i=0;i<pts.length;i++) {
    const p0=pts[(i-1+pts.length)%pts.length], p1=pts[i], p2=pts[(i+1)%pts.length];
    const cp1x=(p0[0]+p1[0])/2, cp1y=(p0[1]+p1[1])/2;
    const cp2x=(p1[0]+p2[0])/2, cp2y=(p1[1]+p2[1])/2;
    d+=` C ${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2[0].toFixed(1)},${p2[1].toFixed(1)}`;
  }
  return d+'Z';
}

function leafPath(x1,y1,x2,y2,bulge) {
  const mx=(x1+x2)/2, my=(y1+y2)/2;
  const dx=x2-x1, dy=y2-y1;
  const nx=-dy*bulge, ny=dx*bulge;
  return `M ${x1} ${y1} Q ${(mx+nx).toFixed(1)} ${(my+ny).toFixed(1)} ${x2} ${y2} Q ${(mx-nx*0.3).toFixed(1)} ${(my-ny*0.3).toFixed(1)} ${x1} ${y1} Z`;
}

function drawFlower(done) {
  const svg = document.getElementById('flower-svg');
  const msg = document.getElementById('flower-msg');
  const cx=90, groundY=155;
  let h = '';

  h += `<ellipse cx="${cx}" cy="${groundY}" rx="32" ry="7" fill="#c8b890" opacity="0.35"/>`;

  if (done === 0) {
    h += `<path d="${blob(cx, groundY-5, 8, 10, 1.2)}" fill="#a08860" opacity="0.6"/>`;
    msg.textContent = 'zasiej pierwszy nawyk…';
    svg.innerHTML = h; return;
  }

  const maxStemH = 95;
  const stemH = Math.min(20 + (done/TOTAL)*maxStemH, maxStemH);
  const stemTop = groundY - stemH;
  const stemMidX = cx + Math.sin(0.8)*6;

  h += `<path d="M ${cx} ${groundY} Q ${stemMidX} ${groundY-stemH*0.5} ${cx-2} ${stemTop}" stroke="#5a8a42" stroke-width="4" fill="none" stroke-linecap="round"/>`;
  h += `<path d="M ${cx} ${groundY} Q ${stemMidX+1} ${groundY-stemH*0.5} ${cx-2} ${stemTop}" stroke="#7aaa5a" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>`;

  if (done >= 2) {
    h += `<path d="${leafPath(cx-1, groundY-stemH*0.35, cx-22, groundY-stemH*0.55, 0.45)}" fill="#6a9e52" opacity="0.85"/>`;
    h += `<line x1="${cx-1}" y1="${groundY-stemH*0.35}" x2="${cx-18}" y2="${groundY-stemH*0.52}" stroke="#4a7a32" stroke-width="0.8" opacity="0.5"/>`;
  }
  if (done >= 3) {
    h += `<path d="${leafPath(cx-2, groundY-stemH*0.6, cx+22, groundY-stemH*0.72, -0.4)}" fill="#7aaa5a" opacity="0.8"/>`;
    h += `<line x1="${cx-2}" y1="${groundY-stemH*0.6}" x2="${cx+18}" y2="${groundY-stemH*0.7}" stroke="#5a8a42" stroke-width="0.8" opacity="0.5"/>`;
  }

  if (done >= 4) {
    const petalPalettes = [
      ['#e8a0b8','#f4c0d0','#d880a8'],
      ['#e8a0b8','#f4c0d0','#d880a8'],
      ['#e8a0b8','#f4bace','#e090b8'],
      ['#e8a0b8','#f4c0d0','#d880a8'],
      ['#e8a0b8','#f4c0d0','#d880a8'],
      ['#e8a0b8','#f4c0d0','#d880a8'],
    ];
    const numPetals = Math.min((done-3)*2, 6);
    const pr = 20;
    for (let i=0;i<numPetals;i++) {
      const angle = (i/6)*Math.PI*2 - Math.PI/2;
      const px = cx + Math.cos(angle)*pr;
      const py = stemTop + Math.sin(angle)*pr;
      const col = petalPalettes[i % petalPalettes.length];
      const seed = i*1.7+0.5;
      h += `<path d="${blob(px,py,13,12,seed)}" fill="${col[0]}" opacity="0.88"/>`;
      h += `<path d="${blob(px,py,7,8,seed+1)}" fill="${col[1]}" opacity="0.5"/>`;
    }
  }

  if (done >= 4) {
    const cR = done === TOTAL ? 15 : 11;
    const cCol = done === TOTAL ? '#f0c030' : '#e8c870';
    const cCol2 = done === TOTAL ? '#c89010' : '#c8a840';
    h += `<path d="${blob(cx,stemTop,cR,14,2.1)}" fill="${cCol}" opacity="0.95"/>`;
    h += `<path d="${blob(cx,stemTop,cR*0.55,10,3.5)}" fill="${cCol2}" opacity="0.7"/>`;
    for (let i=0;i<7;i++){const a=(i/7)*Math.PI*2;h+=`<circle cx="${(cx+Math.cos(a)*cR*0.35).toFixed(1)}" cy="${(stemTop+Math.sin(a)*cR*0.35).toFixed(1)}" r="1.8" fill="${cCol2}" opacity="0.6"/>`;}
  }

  if (done === TOTAL) {
    for (let i=0;i<5;i++){
      const bx=cx+[-28,26,-18,30,-35][i], by=stemTop+[-30,-25,-18,-40,-10][i];
      const bs=[5,4,6,4,5][i];
      const bc=['#e8a0b8','#f4c0d0','#d4e890','#f4c0d0','#e8a0b8'][i];
      h+=`<path d="${blob(bx,by,bs,8,i*1.3)}" fill="${bc}" opacity="${[0.5,0.4,0.45,0.35,0.4][i]}"/>`;
    }
    msg.textContent = 'ogród w pełnym rozkwicie ✦';
  } else {
    const msgs = ['','ziarno kiełkuje…','łodyżka sięga ku słońcu…','pierwsze listki 🌿','pąki się formują…','płatki rozwijają się…','ogród w pełnym rozkwicie ✦'];
    msg.textContent = msgs[done] || '';
  }

  svg.innerHTML = h;
}

function render() {
  const list = document.getElementById('habits');
  list.innerHTML = '';
  let done=0, bestAll=0;

  HABITS.forEach(h => {
    const isDone = !!state.days[today][h.id];
    if (isDone) done++;
    const s = streak(h.id);
    const b = bestStreak(h.id);
    if (b>bestAll) bestAll=b;
    const l7 = last7(h.id);
    const hot = s >= 3;

    const card = document.createElement('div');
    card.className = 'hcard'+(isDone?' done':'');
    card.setAttribute('role','checkbox');
    card.setAttribute('aria-checked',isDone?'true':'false');
    card.setAttribute('aria-label',h.name);
    card.setAttribute('tabindex','0');
    card.onclick = () => toggle(h.id);
    card.onkeydown = e => { if(e.key===' '||e.key==='Enter'){e.preventDefault();toggle(h.id);} };

    const dots = l7.map(d=>{
      if(d.done) return '<div class="hdot on"></div>';
      if(d.isToday) return '<div class="hdot cur"></div>';
      return '<div class="hdot"></div>';
    }).join('');

    card.innerHTML = `
      <div class="hcircle">
        <span class="hicon" aria-hidden="true">${h.icon}</span>
        <span class="hchk" aria-hidden="true">✓</span>
      </div>
      <div class="hinfo">
        <div class="hname">${h.name}</div>
        <div class="hdots">${dots}</div>
      </div>
      <div class="hstreak">
        <div class="hstreak-num${hot?' hot':''}">${s}${hot?' 🔥':''}</div>
        <div class="hstreak-lbl">dni z rzędu</div>
      </div>`;
    list.appendChild(card);
  });

  document.getElementById('s-done').textContent = done;
  document.getElementById('s-best').textContent = bestAll;
  document.getElementById('s-pct').textContent = Math.round(done/TOTAL*100)+'%';
  drawFlower(done);
}

document.getElementById('date-lbl').textContent = new Date().toLocaleDateString('pl-PL',{weekday:'long',day:'numeric',month:'long'});
render();
</script>
